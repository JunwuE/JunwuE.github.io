<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junwu E - 个人主页</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Junwu E</a>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <a href="publications.html" class="nav-link">Publications</a>
                <a href="projects.html" class="nav-link">Projects</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </div>
            <div class="nav-toggle" id="nav-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- 主页部分：终端 + 方形机器人 -->
    <section id="home" class="hero">
        <div class="hero-panels">
            <!-- 左侧：终端 -->
            <div class="terminal-pane" id="terminal-pane">
                <div class="terminal-header">
                    <span class="terminal-title">JUNWU_OS v1.0</span>
                    <span class="terminal-status">Status: ONLINE</span>
                </div>
                <div class="terminal-body" id="terminal-body">
                    <!-- 终端输出行由 JS 动态注入 -->
                </div>
                <form class="terminal-input-line" id="terminal-form" autocomplete="off">
                    <span class="terminal-prompt">guest@junwu-e:~$</span>
                    <input type="text" id="terminal-input" spellcheck="false" autocomplete="off" />
                    <span class="terminal-caret"></span>
                </form>
            </div>

            <!-- 右侧：方形像素机器人 -->
            <div class="robot-pane" id="robot-pane">
                <canvas id="robot-canvas" width="720" height="720"></canvas>
                <div class="robot-status" id="robot-status">[ UNIT_STATUS: IDLE ]</div>
                <div class="robot-speech" id="robot-speech"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
